name: Lint and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Root Dependencies
        run: pnpm install

      - name: Bootstrap Workspaces
        run: pnpm bootstrap

      - name: Run Linter and Tests
        run: pnpm check
