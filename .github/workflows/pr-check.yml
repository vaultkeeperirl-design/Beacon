name: PR Check

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Root Dependencies
        run: pnpm install

      - name: Bootstrap Monorepo
        run: pnpm bootstrap

      - name: Rebuild Native Modules
        run: npm rebuild better-sqlite3 --prefix backend

      - name: Run Checks (Lint & Test)
        run: pnpm check
